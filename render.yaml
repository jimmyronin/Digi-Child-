services:
  - type: web
    name: digichild-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DIGICHILD_DB_PATH
        value: /data/digichild.db
      - key: DIGICHILD_SIM_URL
        value: https://mitraker.github.io/Digi-Child-Live
    disk:
      name: digichild-data
      mountPath: /data
      sizeGB: 1
