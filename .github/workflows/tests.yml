name: Backend Tests

# Runs the clinical-logic suite on every push and PR. The suite is hermetic --
# DIGICHILD_AI=local forces demo mode, so CI needs no API key, makes no network
# calls, and costs nothing.
on:
  push:
    branches: [main, dev, backend]
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # backend/ is a submodule on the dev branch and a plain folder on main;
          # this makes the job work on either without a second workflow.
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v
