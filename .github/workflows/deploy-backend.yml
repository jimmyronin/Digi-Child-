name: Trigger Render Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "backend"
      - "backend/**"
      - "render.yaml"
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Check Render Deploy Hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "::error::Set the RENDER_DEPLOY_HOOK_URL repository secret to deploy the backend to Render."
          exit 1

      - name: Trigger Render Deploy Hook
        # Set RENDER_DEPLOY_HOOK_URL in your GitHub repo secrets:
        # GitHub repo -> Settings -> Secrets and variables -> Actions -> New secret
        # Name: RENDER_DEPLOY_HOOK_URL
        # Value: paste your Render deploy hook URL
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered successfully"
